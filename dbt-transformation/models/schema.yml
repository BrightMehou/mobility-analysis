version: 2

models:

  - name: stg_city
    description: "Table de staging des villes avec leurs informations brutes."
  - name: stg_station_statement
    description: "Table de staging unifiant les relevés de disponibilité des stations des différentes villes."
  - name: stg_station
    description: "Table de staging unifiant les informations des stations des différentes villes."


  - name: consolidate_station
    description: "Table des stations de vélos avec leurs informations générales."
    config:
      contract: {enforced: true}
    constraints:
      - type: primary_key
        columns: [id, created_date]
    columns:
      - name: id
        description: "Identifiant unique de la station."
        data_type: text
        constraints:
          - type: not_null
      - name: code
        description: "Code de la station."     
        data_type: text
        constraints:
          - type: not_null
      - name: name
        description: "Nom de la station."
        data_type: text
      - name: city_name
        description: "Nom de la ville associée à la station."
        data_type: text
      - name: city_code
        description: "Code de la ville."
        data_type: text
      - name: address
        description: "Adresse postale de la station."
        data_type: text
      - name: longitude
        description: "Longitude géographique de la station."
        data_type: float
      - name: latitude
        description: "Latitude géographique de la station."
        data_type: float
      - name: status
        description: "Statut de la station (ouverte/fermée/etc)."
        data_type: text
      - name: created_date
        description: "Date de création de l'enregistrement."
        data_type: date
        constraints:
          - type: not_null
      - name: capacity
        description: "Capacité en nombre de vélos."
        data_type: integer
  - name: consolidate_city
    description: "Table des villes avec le nombre d’habitants."
    config:
      contract: {enforced: true}
    constraints:
      - type: primary_key
        columns: [id, created_date]
    columns:
      - name: id
        description: "Identifiant unique de la ville."
        data_type: text
        constraints:
          - type: not_null
      - name: name
        description: "Nom de la ville."
        data_type: text
      - name: nb_inhabitants
        description: "Nombre d’habitants."
        data_type: integer
      - name: created_date
        description: "Date de création de l’enregistrement."
        data_type: date
        constraints:
          - type: not_null
  - name: consolidate_station_statement
    description: "Table des relevés quotidiens de disponibilité des stations."
    config:
      contract: {enforced: true}
    constraints:
      - type: primary_key
        columns: [station_id, created_date]
    columns:
      - name: station_id
        description: "Référence à l'identifiant de la station."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - relationships:
              arguments:
                to: ref('consolidate_station')
                field: id
      - name: bicycle_docks_available
        description: "Nombre de places libres pour garer un vélo."
        data_type: integer
      - name: bicycle_available
        description: "Nombre de vélos disponibles."
        data_type: integer
      - name: last_statement_date
        description: "Horodatage du dernier relevé."
        data_type: timestamp
      - name: created_date
        description: "Date de création de l’enregistrement."
        data_type: date
        constraints:
          - type: not_null

  - name: dim_station
    description: "Dimension des stations de vélos, contenant les informations statiques."
    config:
      contract: {enforced: true}
    columns:
      - name: id
        description: "Identifiant unique de la station."
        data_type: text
        constraints:
          - type: primary_key
      - name: code
        description: "Code de la station."
        data_type: text
      - name: name
        description: "Nom de la station."
        data_type: text
      - name: address
        description: "Adresse de la station."
        data_type: text
      - name: longitude
        description: "Longitude géographique."
        data_type: float
      - name: latitude
        description: "Latitude géographique."
        data_type: float
      - name: status
        description: "Statut de la station (ouverte/fermée/etc)."
        data_type: text
      - name: capacity
        description: "Capacité maximale de vélos."
        data_type: integer
  - name: dim_city
    description: "Dimension des villes, contenant le nombre d’habitants."
    config:
      contract: {enforced: true}
    columns:
      - name: id
        description: "Identifiant unique de la ville."
        data_type: text
        constraints:
          - type: primary_key
      - name: name
        description: "Nom de la ville."
        data_type: text
      - name: nb_inhabitants
        description: "Nombre d’habitants de la ville."
        data_type: integer
  - name: fact_station_statement
    description: "Table de faits contenant les relevés de disponibilité des stations par date et ville."
    config:
      contract: {enforced: true}
    constraints:
      - type: primary_key
        columns: [station_id, city_id, created_date]
    columns:
      - name: station_id
        description: "Identifiant de la station (FK vers dim_station)."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_station')
                field: id
      - name: city_id
        description: "Identifiant de la ville (FK vers dim_city)."
        data_type: text
        constraints:
          - type: not_null
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_city')
                field: id
      - name: bicycle_docks_available
        description: "Nombre de places libres pour vélos."
        data_type: integer
      - name: bicycle_available
        description: "Nombre de vélos disponibles."
        data_type: integer
      - name: last_statement_date
        description: "Horodatage du dernier relevé."
        data_type: timestamp
      - name: created_date
        description: "Date de création de l’enregistrement (par défaut aujourd'hui)."
        data_type: date
        constraints:
          - type: not_null

    # PRIMARY KEY (station_id, city_id, created_date),
    # FOREIGN KEY (station_id) REFERENCES dim_station(id),
    # FOREIGN KEY (city_id) REFERENCES dim_city(id)

  - name: map_station
    description: >
      Stations géolocalisées avec leur dernier relevé de disponibilité.
      Exposée au dashboard Streamlit (carte).
    columns:
      - name: id
        description: "Identifiant station (dim_station)."
      - name: code
        description: "Code station."
      - name: name
        description: "Nom affiché de la station."
      - name: address
        description: "Adresse postale."
      - name: latitude
        description: "Latitude (stations sans coordonnées exclues)."
      - name: longitude
        description: "Longitude (stations sans coordonnées exclues)."
      - name: status
        description: "Statut de la station."
      - name: capacity
        description: "Capacité en emplacements."
      - name: bicycle_docks_available
        description: "Places libres au dernier relevé."
      - name: bicycle_available
        description: "Vélos disponibles au dernier relevé."
      - name: last_statement_date
        description: "Horodatage du dernier relevé."

  - name: available_emplacement_by_city
    description: >
      Somme des places libres (bicycle_docks_available) par ville cible
      (Paris, Nantes, Toulouse, Strasbourg).
    columns:
      - name: name
        description: "Nom de la ville (dim_city)."
        data_tests:
          - not_null
          - unique
      - name: sum_bicycle_docks_available
        description: "Total des emplacements libres pour la ville."

  - name: mean_bicycle_available_by_station
    description: "Moyenne historique des vélos disponibles par station."
    columns:
      - name: name
        description: "Nom de la station."
      - name: code
        description: "Code station."
      - name: address
        description: "Adresse de la station."
      - name: avg_dock_available
        description: "Moyenne de bicycle_available sur fact_station_statement."

  - name: total_capacity_by_city
    description: "Capacité totale des stations par ville."
    columns:
      - name: city_name
        description: "Nom de la ville."
        data_tests:
          - not_null
          - unique
      - name: total_capacity
        description: "Somme des capacity des stations de la ville."
