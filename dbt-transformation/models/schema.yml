version: 2

models:

  - name: stg_city
    description: "Table de staging des villes avec leurs informations brutes."
  - name: stg_station
    description: "Table de staging unifiant les informations des stations des différentes villes."


  - name: station
    description: "Table des stations de vélos avec leurs informations générales et de disponibilité."
    config:
      contract: {enforced: true}
    columns:
      - name: id
        description: "Identifiant unique de la station."
        data_type: text
        constraints:
          - type: primary_key
      - name: code
        description: "Code de la station."     
        data_type: text
        constraints:
          - type: not_null
      - name: name
        description: "Nom de la station."
        data_type: text
      - name: city_name
        description: "Nom de la ville associée à la station."
        data_type: text
      - name: city_code
        description: "Code de la ville."
        data_type: text
        data_tests:
          - relationships:
              arguments:
                to: ref('city')
                field: id
      - name: address
        description: "Adresse postale de la station."
        data_type: text
      - name: longitude
        description: "Longitude géographique de la station."
        data_type: float
      - name: latitude
        description: "Latitude géographique de la station."
        data_type: float
      - name: status
        description: "Statut de la station (ouverte/fermée/etc)."
        data_type: text
      - name: capacity
        description: "Capacité en nombre de vélos."
        data_type: integer
      - name: bicycle_docks_available
        description: "Nombre de places libres pour garer un vélo."
        data_type: integer
      - name: bicycle_available
        description: "Nombre de vélos disponibles."
        data_type: integer
      - name: last_statement_date
        description: "Horodatage du dernier relevé."
        data_type: timestamp
      - name: created_date
        description: "Date de création de l’enregistrement."
        data_type: date
        constraints:
          - type: not_null
  - name: city
    description: "Table des villes avec le nombre d’habitants."
    config:
      contract: {enforced: true}
    columns:
      - name: id
        description: "Identifiant unique de la ville."
        data_type: text
        constraints:
          - type: primary_key
      - name: name
        description: "Nom de la ville."
        data_type: text
      - name: nb_inhabitants
        description: "Nombre d’habitants."
        data_type: integer
      - name: created_date
        description: "Date de création de l’enregistrement."
        data_type: date
        constraints:
          - type: not_null

  - name: map_station
    description: >
      Stations géolocalisées avec leur dernier relevé de disponibilité.
      Exposée au dashboard Streamlit (carte).
    columns:
      - name: id
        description: "Identifiant station (dim_station)."
      - name: code
        description: "Code station."
      - name: name
        description: "Nom affiché de la station."
      - name: address
        description: "Adresse postale."
      - name: latitude
        description: "Latitude (stations sans coordonnées exclues)."
      - name: longitude
        description: "Longitude (stations sans coordonnées exclues)."
      - name: status
        description: "Statut de la station."
      - name: capacity
        description: "Capacité en emplacements."
      - name: bicycle_docks_available
        description: "Places libres au dernier relevé."
      - name: bicycle_available
        description: "Vélos disponibles au dernier relevé."
      - name: last_statement_date
        description: "Horodatage du dernier relevé."

  - name: available_emplacement_by_city
    description: >
      Somme des places libres (bicycle_docks_available) par ville
    columns:
      - name: name
        description: "Nom de la ville (dim_city)."
        data_tests:
          - not_null
          - unique
      - name: bicycle_docks_available
        description: "Total des emplacements libres pour la ville."
      - name: bicycle_available
        description: "Total des vélos disponibles pour la ville."

  - name: total_capacity_by_city
    description: "Capacité totale des stations par ville."
    columns:
      - name: city_name
        description: "Nom de la ville."
        data_tests:
          - not_null
          - unique
      - name: total_capacity
        description: "Somme des capacity des stations de la ville."
