services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build:
      context: .
    ports:
      - "8501:8501"  
      - "8080:8080"   
    environment:
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      postgres:
          condition: service_healthy
    command: >
      bash -c "python src/init_db.py && \
              dbt docs generate --project-dir dbt-transformation --profiles-dir dbt-transformation && \
              (streamlit run src/ui.py --server.port 8501 --server.address 0.0.0.0 &) && \
              dbt docs serve --project-dir dbt-transformation --profiles-dir dbt-transformation --port 8080 --host 0.0.0.0"
volumes:
  postgres_data:
    driver: local